services:

    ubuntu:
        build:
            context: .
            dockerfile: ubuntu.dockerfile
        container_name: ubuntu
        ports:
            - 8080:80
            - "67:67/udp"
            - 4005:4005
            - 2068:68
            - 2021:21
            - 3307:3306
        volumes:
            - ./:/var/www/html
        cap_add:
            - NET_ADMIN
        networks:
            kali-app-network:
                ipv4_address: 10.0.0.3

networks:
    kali-app-network:
        driver: bridge
        ipam:
          driver: default
          config:
            - subnet: "10.0.0.0/16"  # Changed to a more standard Docker subnet
